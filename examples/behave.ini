[behave]
default_format=modern
stdout_capture=false
stderr_capture=false
logging_level=INFO
summary=false

[behave.userdata]
mcr.colors = true
mcr.live = false
mcr.show_steps = true
mcr.show_traceback = true

[behave.formatters]
modern = behave_modern_console_report.formatter:ModernConsoleFormatter
