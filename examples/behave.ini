[behave]
default_format=ci
stdout_capture=false
stderr_capture=false
logging_level=INFO
summary=false

[behave.userdata]
# Global defaults (used when a formatter-specific key is missing)
mcr.colors = true
mcr.show_steps = true
mcr.show_traceback = true

# Modern formatter settings (non-live, no progress bar)
# mcr.modern.show_steps = true
# mcr.modern.show_traceback = true

# Modern-live formatter settings (tqdm progress bar)
# mcr.modern-live.show_steps = true
# mcr.modern-live.show_traceback = true

# Modern-test formatter settings (experimental prompt_toolkit live display)
# mcr.modern-test.show_steps = true
# mcr.modern-test.show_traceback = true

# CI formatter settings (formatter-specific, no global fallback)
# mcr.ci.show_progress = true
# mcr.ci.show_steps = true
# mcr.ci.show_traceback = true

# Progress formatter settings (formatter-specific, no global fallback)
# mcr.progress.show_progress = true

[behave.formatters]
modern = behave_modern_console_report.formatters.modern:ModernFormatter
modern-live = behave_modern_console_report.formatters.modern_live:ModernLiveFormatter
modern-test = behave_modern_console_report.formatters.modern_test:ModernTestFormatter
log = behave_modern_console_report.formatters.log:LogFormatter
ci = behave_modern_console_report.formatters.ci:CIFormatter
minimal = behave_modern_console_report.formatters.minimal:MinimalFormatter
progress = behave_modern_console_report.formatters.progress:ProgressFormatter
